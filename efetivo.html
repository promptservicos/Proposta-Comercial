<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prompt · Proposta Efetivo</title>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="efetivo.css">
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-analytics-compat.js"></script>
</head>
<body>
    <div class="container">
        <div class="header">
            <i class="fas fa-bolt header-icon"></i>
            <h1>Prompt Serviços</h1>
            <div class="header-actions">
                <button id="btn-tema" class="btn-tema" title="Modo claro/escuro">
                    <i class="fas fa-moon"></i>
                </button>
                <button id="btn-voltar" class="btn-voltar" title="Voltar ao início">
                    <i class="fas fa-arrow-left"></i>
                </button>
            </div>
        </div>

        <div class="vendedor-info">
            <i class="fas fa-user-tie"></i>
            <span id="vendedor-nome">Carregando...</span>
        </div>

        <p class="subtitle"><i class="fas fa-file-signature"></i> Proposta de contrato efetivo</p>

        <!-- Campo Cliente -->
        <div class="field cliente-field">
            <label><i class="fas fa-building"></i> Cliente</label>
            <input type="text" id="cliente-nome" class="input-moderno" placeholder="NOME DO CLIENTE" style="text-transform: uppercase;">
        </div>

        <!-- Container dos cargos -->
        <div id="cargos-container"></div>

        <!-- Botão adicionar cargo -->
        <button type="button" id="adicionar-cargo" class="btn-add">
            <i class="fas fa-plus-circle"></i> Adicionar cargo
        </button>

        <!-- Resumo final -->
        <div class="resumo-final">
            <div class="resumo-item">
                <i class="fas fa-chart-line"></i>
                <span>Total da proposta:</span>
                <strong id="total-geral">R$ 0,00</strong>
            </div>
        </div>

        <!-- Botões de ação - SALVAR e COMPARTILHAR -->
        <div class="action-buttons">
            <button type="button" class="btn" id="btn-salvar">
                <i class="fas fa-save"></i> Salvar proposta
            </button>
            <button type="button" class="btn" id="btn-compartilhar">
                <i class="fas fa-share-alt"></i> Compartilhar
            </button>
        </div>
    </div>

    <!-- Modal de compartilhamento -->
    <div id="modal-share" class="modal-overlay hidden">
        <div class="modal-content">
            <i class="fas fa-link modal-icon"></i>
            <p class="modal-text">Link para visualização da proposta</p>
            <div class="share-link-container">
                <input type="text" id="share-link" class="input-moderno" readonly>
                <button id="btn-copiar-link" class="btn-copiar">
                    <i class="fas fa-copy"></i> Copiar
                </button>
            </div>
            <div class="modal-buttons">
                <button class="modal-btn modal-btn-ok" id="modal-share-ok">Fechar</button>
            </div>
        </div>
    </div>

    <!-- Modal de confirmação -->
    <div id="modal-overlay" class="modal-overlay hidden">
        <div class="modal-content">
            <p class="modal-text" id="modal-mensagem">Proposta salva com sucesso!</p>
            <div class="modal-buttons">
                <button class="modal-btn modal-btn-ok" id="modal-ok">OK</button>
            </div>
        </div>
    </div>

    <script src="efetivo.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</body>
</html>
