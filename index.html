<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login · Prompt Serviços</title>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="index.css">
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-analytics-compat.js"></script>
</head>
<body>
    <div class="container">
        <div class="login-box">
            <div class="logo-container">
                <img src="logo.png" alt="Prompt Serviços" class="logo">
            </div>
            
            <p class="subtitle">
                <i class="fas fa-lock"></i> 
                Acesse sua conta
            </p>

            <form id="login-form">
                <div class="input-group">
                    <label for="email">
                        <i class="fas fa-envelope"></i>
                        E-mail
                    </label>
                    <div class="input-field">
                        <i class="fas fa-envelope input-icon"></i>
                        <input type="email" id="email" name="email" placeholder="seu@email.com" autocomplete="email" required>
                    </div>
                </div>

                <div class="input-group">
                    <label for="password">
                        <i class="fas fa-key"></i>
                        Senha
                    </label>
                    <div class="input-field">
                        <i class="fas fa-lock input-icon"></i>
                        <input type="password" id="password" name="password" placeholder="••••••••" autocomplete="current-password" required>
                        <button type="button" class="toggle-password" id="toggle-password">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>

                <div class="options">
                    <label class="checkbox-label">
                        <input type="checkbox" id="remember">
                        <span class="checkbox-custom"></span>
                        <span class="checkbox-text">Lembrar-me</span>
                    </label>
                </div>

                <button type="submit" class="btn-login" id="btn-login">
                    <i class="fas fa-sign-in-alt"></i>
                    Entrar
                </button>
            </form>

            <div class="info-message">
                <i class="fas fa-info-circle"></i>
                <span>Use as credenciais fornecidas pela administração</span>
            </div>

            <!-- Botão de tema no rodapé -->
            <div class="tema-container">
                <button id="btn-tema" class="btn-tema" title="Modo claro/escuro">
                    <i class="fas fa-sun"></i>
                    <span>Modo claro</span>
                </button>
            </div>
        </div>
    </div>

    <!-- Modal de erro/mensagem -->
    <div id="modal-overlay" class="modal-overlay hidden">
        <div class="modal-content">
            <i class="fas fa-exclamation-circle modal-icon"></i>
            <p class="modal-text" id="modal-mensagem">Erro ao fazer login</p>
            <div class="modal-buttons">
                <button class="modal-btn modal-btn-ok" id="modal-ok">OK</button>
            </div>
        </div>
    </div>

    <script src="index.js"></script>
</body>
</html>
